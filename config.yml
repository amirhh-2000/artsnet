baseURL: 'https://artsnet.ir/'
languageCode: 'en-us'
title: 'artsnet'
theme: 'PaperMod'

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

googleAnalytics: G-RYR2VQET39

defaultContentLanguage: en
defaultContentLanguageInSubdir: true

fontcode: Fira Code
languages:
  fa:
    contentDir: content
    disabled: false
    languageCode: fa
    languageDirection: rtl
    languageName: Farsi
    weight: 2
    fontbody: /static/fonts/Vazir.woff2
    params:
      homeInfoParams:
        Title: "سلام \U0001F44B"
        Content: به وبلاگ من خوش آمدید
  en:
    contentDir: content
    disabled: false
    languageCode: en-US
    languageDirection: ltr
    languageName: English
    weight: 1

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  keywords: [Blog, Python, Programming, Article, Software]
  defaultTheme: auto # dark, light
  disableThemeToggle: false
  disableSpecial1stPost: false
  disableScrollToTop: false
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

params:
  homeInfoParams:
    Title: "Hi there \U0001F44B"
    Content: Welcome to my blog
  
  socialIcons:
    - name: github
      url: "https://github.com/amirhh-2000"
    - name: linkedin
      url: "https://www.linkedin.com/in/amirhossein-hasanzadeh"
  
  label:
    text: "artsnet"
    icon: /apple-touch-icon.png
    iconHeight: 35

  post:
    author: Amir Hossein
    DateFormat: "January 2, 2006"
    ShowReadingTime: true
    ShowShareButtons: true
    ShowPostNavLinks: true
    ShowBreadCrumbs: true
    ShowCodeCopyButtons: false
    ShowRssButtonInSectionTermList: true
    UseHugoToc: true
    comments: true
